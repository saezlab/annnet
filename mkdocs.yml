#=======    Extension settings (sorted alphabetically)  =====
markdown_extensions:
-   admonition
-   attr_list
-   md_in_html
  #----- Python Markdown Extensions
-   pymdownx.details
-   pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg
-   pymdownx.highlight: # Note: list of Pygments: https://pygments.org/docs/lexers/
        anchor_linenums: true
        line_spans: __span
        pygments_lang_class: true
-   pymdownx.inlinehilite
-   pymdownx.snippets
-   pymdownx.superfences:
        custom_fences:
        -   name: mermaid
            class: mermaid
            format: !!python/name:pymdownx.superfences.fence_code_format
-   pymdownx.tabbed:
        alternate_style: true

#=======    Plugins    =====
plugins:
-   search
-   autorefs
-   mkdocstrings:
        default_handler: python
        handlers:
            python:
                options:
                    annotations_path: brief
                    docstring_style: numpy
                    heading_level: 3
                    members_order: source
                    modernize_annotations: true
                    show_category_heading: true
                    show_object_full_path: false
                    show_root_toc_entry: true
                    show_signature: true
                    show_signature_annotations: false
                    signature_crossrefs: true
                    show_bases: false
                    show_if_no_docstring: false
                    show_source: false
                    separate_signature: true
                    line_length: 60
-   mkdocs-jupyter:
        execute: true
        execute_ignore:
        -   tutorials/notebooks/scenarios/*.ipynb
        -   tutorials/notebooks/use_cases/*.ipynb
        -   tutorials/notebooks/use_cases/*/*.ipynb

hooks:
  # Quiet Jupyter/nbformat warning noise during docs builds.
  - tools/mkdocs_hooks.py

extra_css:
  - assets/overrides.css

